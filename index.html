<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <title>FlipOff — Split-Flap Fullscreen</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/board.css" />
  <link rel="stylesheet" href="css/tile.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <main class="app" id="app" aria-label="Split-Flap Display">
    <section class="stage" id="stage">
      <div class="board-shell">
        <div class="board" id="board" aria-live="polite" aria-atomic="true"></div>
      </div>

      <button class="fullscreen-hitbox" id="fullscreen-hitbox" type="button" aria-label="Vollbild starten"></button>

      <div class="boot-message" id="boot-message" role="status" aria-live="polite">
        Klick oder drücke F für Vollbild
      </div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
